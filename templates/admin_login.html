<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Agency Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-container{text-align:center;padding:48px;background:#1a1a2e;border-radius:16px;border:1px solid #2a2a4a;max-width:400px;width:100%}
.lock-icon{font-size:48px;margin-bottom:16px}
h2{color:#e0e0e0;margin-bottom:8px}
p{color:#888;margin-bottom:24px;font-size:14px}
.btn{display:inline-block;padding:14px 36px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(102,126,234,.4)}
.input{width:100%;padding:12px 16px;border:1px solid #2a2a4a;border-radius:8px;background:#16213e;color:#e0e0e0;font-size:15px;outline:none;transition:border .2s;box-sizing:border-box}
.input:focus{border-color:#667eea}
.input::placeholder{color:#555}
.error{color:#fc8181;font-size:13px;margin-top:8px;display:none}
.note{color:#555;font-size:12px;margin-top:20px}
</style>
</head>
<body>
<div class="login-container">
<div class="lock-icon">🔒</div>
<h2>Admin Panel</h2>
<p>Enter the admin password to view all users' auto-export progress.</p>

<form id="passwordForm" onsubmit="loginWithPassword();return false" autocomplete="off">
<input type="password" id="adminPassword" class="input" placeholder="Admin password" autocomplete="new-password" value="" readonly onfocus="this.removeAttribute('readonly')">
<div id="loginError" class="error"></div>
<button type="submit" class="btn" style="margin-top:12px">Unlock Admin Panel →</button>
</form>

<p class="note">After logging in, every user's auto-export progress is visible here in real-time.</p>
</div>

<script>
(function() {
  var pw = document.getElementById('adminPassword');
  pw.value = '';
  pw.removeAttribute('readonly');
  setTimeout(function() { pw.value = ''; }, 100);
})();

async function loginWithPassword() {
  const pass = document.getElementById('adminPassword').value;
  const errorDiv = document.getElementById('loginError');
  if (!pass) {
    errorDiv.textContent = 'Please enter a password';
    errorDiv.style.display = 'block';
    return;
  }
  try {
    const r = await fetch('/api/admin/password-login?password=' + encodeURIComponent(pass));
    const d = await r.json();
    if (d.success) {
      window.location.href = '/admin';
    } else {
      errorDiv.textContent = d.error || 'Wrong password';
      errorDiv.style.display = 'block';
    }
  } catch(e) {
    errorDiv.textContent = 'Login failed: ' + e.message;
    errorDiv.style.display = 'block';
  }
}
</script>
</body>
</html>
